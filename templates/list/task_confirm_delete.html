{% extends "base.html" %}


{% block content %}
  <h1>Delete task</h1>

  <p>Are you sure you want to delete the task: {{ task.name }}?</p>
  <form action="" method="post">
    {% csrf_token %}
    <a href="javascript:history.back()" class="btn btn-secondary">Cancel</a>
    <input type="submit" value="Yes, delete" class="btn btn-danger">
  </form>

{% endblock %}
