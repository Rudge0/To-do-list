{% extends "base.html" %}

{% block content %}
  <h1>
    Tags list
    <a href="{% url 'list:tag-create' %}" class="btn btn-primary link-to-page">Create</a>
  </h1>
  {% if tag_list %}
    <table class="table">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Update</th>
        <th>Delete</th>
      </tr>

      {% for tag in tag_list.all %}
        <tr>
          <td>
            {{ tag.id }}
          </td>
          <td>
            {{ tag.name }}
          </td>
          <td>
            <a href="{% url 'list:tag-update' pk=tag.id %}">UPDATE</a>
          </td>
          <td>
            <a href="{% url 'list:tag-delete' pk=tag.id %}">DELETE</a>
          </td>
        </tr>
      {% endfor %}


    </table>
  {% else %}
    <p>There is no tags</p>
  {% endif %}
{% endblock %}
